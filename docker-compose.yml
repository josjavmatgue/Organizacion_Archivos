version: '3.8'

services:
  web_upi:
    image: nginx:alpine
    container_name: contenedor_pagina_upi
    ports:
      - "8080:80"  # Los estudiantes verán la página entrando a http://<IP_DEL_HOST>:8080
    volumes:
      # Enlaza el archivo index.html descargado por Jenkins con la carpeta pública de Nginx
      - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: always